[changelog]
header = """
# Changelog\n
"""
body = """
---
{% if version %}\
    {% if previous.version %}\
        ## [{{ version | trim_start_matches(pat="v") }}]($REPO/compare/{{ previous.version }}..{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
    {% else %}\
        ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
    {% endif %}\
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}

    {% for commit in commits
    | filter(attribute="scope")
    | sort(attribute="scope") -%}
        {% if commit.scope -%}
        - {{self::commit(commit=commit)}}\
        {% endif -%}
    {% endfor -%}
    {% for commit in commits -%}
        {% if commit.scope -%}
        {% else -%}
          - {{self::commit(commit=commit)}}\
        {% endif -%}
    {% endfor -%}
{% endfor %}
{% if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 -%}
### New Contributors
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
  * @{{ contributor.username }} made their first contribution
    {%- if contributor.pr_number %} in \
      [#{{ contributor.pr_number }}]($REPO/pull/{{ contributor.pr_number }})\
    {% endif %}\
{% endfor %}

{% endif -%}
{% macro commit(commit) -%}
{% if commit.scope %}**({{commit.scope}})** {% endif -%}
{% if commit.breaking %}**breaking** {% endif -%}
{{ commit.message | split(pat="\n") | first | trim }} by \
{% if commit.remote.username %}[@{{commit.remote.username}}](https://github.com/{{commit.remote.username}})\
{% else %}{{commit.author.name}}{% endif %} in \
{% if commit.remote.pr_number %}[#{{ commit.remote.pr_number }}]($REPO/pull/{{ commit.remote.pr_number }})\
{% else %}[{{ commit.id | truncate(length=7, end="") }}]($REPO/commit/{{ commit.id }})\
{%- endif %}
{% endmacro commit -%}
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true
postprocessors = [
    { pattern = '\$REPO', replace = "https://github.com/jdx/pr-closer" },
]

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
    { message = '^\d+\.\d+\.\d+$', skip = true },
    { message = '^feat', group = "<!-- 0 -->Features" },
    { message = '^fix', group = "<!-- 1 -->Bug Fixes" },
    { message = '^doc', group = "<!-- 2 -->Documentation" },
    { message = '^perf', group = "<!-- 3 -->Performance" },
    { message = '^refactor', group = "<!-- 4 -->Refactor" },
    { message = '^style', group = "<!-- 5 -->Styling" },
    { message = '^test', group = "<!-- 6 -->Testing" },
    { message = '^chore: release v\d+\.\d+\.\d+', skip = true },
    { message = '^chore|^ci', group = "<!-- 7 -->Miscellaneous Tasks" },
    { body = '.*security', group = "<!-- 8 -->Security" },
    { message = '^revert', group = "<!-- 9 -->Revert" },
    { message = '.', group = "<!-- 10 -->Other Changes" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = '^v\d+\.\d+\.\d+$'
topo_order = false
sort_commits = "oldest"

[remote.github]
owner = "jdx"
repo = "pr-closer"
