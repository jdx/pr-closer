name: PR Closer
description: Warn and close broken pull requests, and close old pull requests.
author: jdx

inputs:
  close-after-days:
    description: Number of calendar days after the first warning before a pull request with failing checks or merge conflicts is closed.
    default: "7"
  max-age-days:
    description: Number of full days an otherwise healthy pull request with settled checks can remain open before it is closed.
    default: "30"
  ignored-author:
    description: Additional pull request author to ignore. Prefer ignored-authors for multiple authors.
  ignored-authors:
    description: Comma-separated or newline-separated pull request authors to ignore.
    default: |-
      jdx
      dependabot[bot]
      renovate[bot]
  ignored-label:
    description: Additional pull request label to ignore. Prefer ignored-labels for multiple labels.
  ignored-labels:
    description: Comma-separated or newline-separated pull request labels to ignore.
    default: keep-open
  github-token:
    description: GitHub token used to list, comment on, and close pull requests.
  limit:
    description: Maximum number of open pull requests to inspect.
    default: "500"
  dry-run:
    description: Log actions without commenting on or closing pull requests.
    default: "false"

runs:
  using: composite
  steps:
    - name: Warn and close pull requests
      shell: bash
      env:
        CLOSE_AFTER_DAYS: ${{ inputs.close-after-days }}
        DRY_RUN: ${{ inputs.dry-run }}
        GH_TOKEN: ${{ inputs.github-token || github.token }}
        IGNORED_AUTHOR: ${{ inputs.ignored-author }}
        IGNORED_AUTHORS: ${{ inputs.ignored-authors }}
        IGNORED_LABEL: ${{ inputs.ignored-label }}
        IGNORED_LABELS: ${{ inputs.ignored-labels }}
        LIMIT: ${{ inputs.limit }}
        MAX_AGE_DAYS: ${{ inputs.max-age-days }}
      run: ${{ github.action_path }}/src/pr-closer.sh
